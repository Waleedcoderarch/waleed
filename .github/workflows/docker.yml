name: Build and Push Heart Disease Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      # Move into project folder
      - name: Change to project directory
        run: cd Heart-Disease-Prediction-main

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build inside correct folder
      - name: Build Docker image
        run: |
          cd Heart-Disease-Prediction-main
          docker build -t ${{ secrets.DOCKER_USERNAME }}/heart-disease:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease:latest